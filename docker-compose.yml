version: "3.9"

# Enterprise NMS — offline / air-gapped deployment stack.
# Build all images on a connected build host, `docker save` them,
# transfer, then `docker load` inside the private cloud.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: nms
      POSTGRES_USER: nms
      POSTGRES_PASSWORD: nms_secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nms -d nms"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build: ./server
    restart: unless-stopped
    env_file: ./server/.env.example
    environment:
      DATABASE_URL: postgres://nms:nms_secret@postgres:5432/nms
      CORS_ORIGIN: http://localhost
    depends_on:
      postgres:
        condition: service_healthy
    # ICMP raw sockets require NET_RAW inside the container
    cap_add:
      - NET_RAW

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    depends_on:
      - api

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - frontend

volumes:
  pgdata:
